services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: flow_analytics
      POSTGRES_USER: flow_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "flow_user", "-d", "flow_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["node", "apps/api/dist/db/migrate.js"]
    environment:
      DATABASE_URL: postgres://flow_user:${POSTGRES_PASSWORD}@postgres:5432/flow_analytics
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      NODE_ENV: development
      DATABASE_URL: postgres://flow_user:${POSTGRES_PASSWORD}@postgres:5432/flow_analytics
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      PLANE_CLIENT_ID: ${PLANE_CLIENT_ID:-}
      PLANE_CLIENT_SECRET: ${PLANE_CLIENT_SECRET:-}
      PLANE_WEBHOOK_SECRET: ${PLANE_WEBHOOK_SECRET:-}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI:-http://localhost:4001/api/auth/plane/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["node", "apps/api/dist/workers/start.js"]
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://flow_user:${POSTGRES_PASSWORD}@postgres:5432/flow_analytics
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      PLANE_CLIENT_ID: ${PLANE_CLIENT_ID:-}
      PLANE_CLIENT_SECRET: ${PLANE_CLIENT_SECRET:-}
      PLANE_WEBHOOK_SECRET: ${PLANE_WEBHOOK_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4001/api
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
